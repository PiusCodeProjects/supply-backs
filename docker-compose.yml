services:
  postgres:
    image: postgres:15-alpine
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: cscp
      POSTGRES_PASSWORD: cscp_dev_pass
      POSTGRES_DB: cscp_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6380:6379'

volumes:
  postgres_data:
